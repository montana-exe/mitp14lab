services:
  collector:
    build: ./collector
    image: lab14-social-collector
    command: ["/app/collector", "-out", "/app/data", "-count", "360", "-batch", "60", "-serve", "-addr", ":8080"]
    ports:
      - "8080:8080"
    volumes:
      - social-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    image: lab14-social-dashboard
    environment:
      ARROW_URL: http://collector:8080/arrow
    ports:
      - "8501:8501"
    depends_on:
      collector:
        condition: service_healthy

volumes:
  social-data:
