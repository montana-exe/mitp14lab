apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: lab14-social
spec:
  selector:
    app: collector
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: lab14-social
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
