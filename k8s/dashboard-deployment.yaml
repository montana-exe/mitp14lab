apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
  namespace: lab14-social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: lab14-social-dashboard:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ARROW_URL
              value: http://collector:8080/arrow
          ports:
            - containerPort: 8501
          readinessProbe:
            httpGet:
              path: /
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard
  namespace: lab14-social
spec:
  type: NodePort
  selector:
    app: dashboard
  ports:
    - port: 8501
      targetPort: 8501
