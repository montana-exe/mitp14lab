apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd
  namespace: lab14-social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: etcd
  template:
    metadata:
      labels:
        app: etcd
    spec:
      containers:
        - name: etcd
          image: quay.io/coreos/etcd:v3.5.15
          args:
            - etcd
            - --name=lab14-etcd
            - --data-dir=/etcd-data
            - --listen-client-urls=http://0.0.0.0:2379
            - --advertise-client-urls=http://etcd:2379
          ports:
            - containerPort: 2379
          readinessProbe:
            exec:
              command: ["etcdctl", "endpoint", "health"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: etcd
  namespace: lab14-social
spec:
  selector:
    app: etcd
  ports:
    - port: 2379
      targetPort: 2379
