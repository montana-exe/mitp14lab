apiVersion: apps/v1
kind: Deployment
metadata:
  name: analyzer
  namespace: lab14-social
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analyzer
  template:
    metadata:
      labels:
        app: analyzer
    spec:
      containers:
        - name: analyzer
          image: lab14-stream-analyzer:latest
          imagePullPolicy: IfNotPresent
          args:
            - python
            - -m
            - pipeline.stream_consumer
            - --nats-url
            - nats://nats:4222
            - --subject
            - social.windows
            - --output
            - /app/data/stream_windows.jsonl
            - --reports
            - /app/reports
            - --flush-every
            - "10"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 600m
              memory: 512Mi
