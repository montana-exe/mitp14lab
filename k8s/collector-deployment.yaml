apiVersion: apps/v1
kind: Deployment
metadata:
  name: collector
  namespace: lab14-social
spec:
  replicas: 2
  selector:
    matchLabels:
      app: collector
  template:
    metadata:
      labels:
        app: collector
    spec:
      containers:
        - name: collector
          image: lab14-social-collector:latest
          imagePullPolicy: IfNotPresent
          args:
            - -out
            - /app/data
            - -count
            - "1000000"
            - -batch
            - "100"
            - -serve
            - -addr
            - :8080
            - -collector-id
            - $(POD_NAME)
            - -shard-index
            - "-1"
            - -shard-total
            - "2"
            - -etcd-endpoint
            - http://etcd:2379
            - -nats-url
            - nats://nats:4222
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 150m
              memory: 128Mi
            limits:
              cpu: 750m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: collector
  namespace: lab14-social
spec:
  selector:
    app: collector
  ports:
    - port: 8080
      targetPort: 8080
